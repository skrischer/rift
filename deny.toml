[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "bzip2-1.0.6",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "Artistic-2.0",
    "MPL-2.0",
    "NCSA",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    # `webpki-root-certs` (bundled CA root data, pulled by `rustls-platform-verifier`
    # via the clone channel's `reqwest`/rustls HTTP transport,
    # `docs/spec-clone-repo.md`): a permissive data license (no share-alike/
    # copyleft clause), same GPL-compatibility class as the other permissive
    # entries above.
    "CDLA-Permissive-2.0",
]
unused-allowed-license = "allow"
confidence-threshold = 0.8

# The termy fork (github.com/skrischer/termy) ships an MIT LICENSE at the repo
# root, but these member crates omit the per-crate `license` field, so cargo-deny
# scanning each crate directory reports them as unlicensed. Clarify the known
# license until the field is added upstream (then bump the pinned rev and drop
# these). Sibling termy crates that declare `license` need no entry here.
[[licenses.clarify]]
crate = "termy_config_core"
expression = "MIT"
license-files = []

[[licenses.clarify]]
crate = "termy_search"
expression = "MIT"
license-files = []

[[licenses.clarify]]
crate = "termy_theme_core"
expression = "MIT"
license-files = []

[[licenses.clarify]]
crate = "termy_themes"
expression = "MIT"
license-files = []
