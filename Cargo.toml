[workspace]
resolver = "2"
members = [
    "crates/app",
    "crates/daemon",
    "crates/tmux-core",
    "crates/terminal",
    "crates/explorer",
    "crates/protocol",
    "crates/plugin-api",
    "crates/ssh",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/pulsecraft/rift"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "2"
gpui = "0.2.2"
flume = "0.12"
alacritty_terminal = "0.26.0"
