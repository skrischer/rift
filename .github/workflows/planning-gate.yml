name: Planning gate

# Enforces the chain: design-doc -> issue -> PR.
# A PR cannot merge unless it closes an issue that traces to an existing spec.
# This job is intended to be a required status check on develop and main.

on:
  pull_request:
    branches: [main, develop]
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  chain:
    name: Verify design-doc -> issue -> PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const title = pr.title || '';

            // Only feat/fix PRs carry implementation progress and must trace to a spec.
            // chore/docs/refactor/test/ci/build/perf are exempt (no spec needed).
            const gated = /^(feat|fix)(\([^)]*\))?!?:/i.test(title);
            if (!gated) {
              core.info(`PR title "${title}" is not feat/fix — planning gate not required.`);
              return;
            }

            // 1. PR body must reference an issue via a GitHub closing keyword.
            const keyword = /\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = [...body.matchAll(keyword)].map(m => Number(m[3]));
            const unique = [...new Set(issueNumbers)];

            if (unique.length === 0) {
              core.setFailed(
                'PR body must close an issue. Add a line like "Closes #123".\n' +
                'The chain is design-doc -> issue -> PR; every PR resolves a planned step.'
              );
              return;
            }

            // Resolve an issue's referenced spec robustly. First-match-only was wrong:
            // an issue body may cite an OLD spec path (e.g. as a grep-and-replace note)
            // BEFORE its real "Spec:" trailer. Once that old spec is archived to
            // docs/archive/, an existence check on the first match fails and falsely
            // blocks a PR whose issue *does* point at a valid spec. Fix: prefer an
            // explicit "Spec:" trailer, then consider every docs/spec-*.md mentioned,
            // and accept the first that resolves to a real file under docs/ or
            // docs/archive/ — the gate's intent is "closes an issue referencing an
            // existing spec", not "the issue's first spec-shaped string exists verbatim".
            const specPattern = /docs\/spec-[A-Za-z0-9._-]+\.md/g;
            const specTrailer = /^\s*Spec:\s*(docs\/spec-[A-Za-z0-9._-]+\.md)/mi;
            // A referenced path resolves to whichever of the live or archived location
            // actually exists; returns the real path, or null when neither exists.
            const resolveSpec = (p) => {
              if (fs.existsSync(p)) return p;
              const archived = p.replace(/^docs\//, 'docs/archive/');
              if (archived !== p && fs.existsSync(archived)) return archived;
              return null;
            };
            const problems = [];

            for (const number of unique) {
              let issue;
              try {
                const res = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                });
                issue = res.data;
              } catch (e) {
                problems.push(`#${number}: issue does not exist.`);
                continue;
              }

              // Skip PRs that happen to match the keyword (issues API returns PRs too).
              if (issue.pull_request) {
                problems.push(`#${number}: refers to a pull request, not an issue.`);
                continue;
              }

              // 2. Issue must reference an existing spec file. Prefer an explicit
              //    "Spec:" trailer, then fall back to every docs/spec-*.md mentioned.
              const issueBody = issue.body || '';
              const trailer = issueBody.match(specTrailer);
              const candidates = [
                ...(trailer ? [trailer[1]] : []),
                ...(issueBody.match(specPattern) || []),
              ];
              if (candidates.length === 0) {
                problems.push(`#${number}: issue body does not reference a docs/spec-*.md file.`);
                continue;
              }
              // Pass if ANY referenced spec resolves to a real file (live or archived).
              let specPath = null;
              for (const candidate of candidates) {
                const resolved = resolveSpec(candidate);
                if (resolved) { specPath = resolved; break; }
              }
              if (!specPath) {
                const cited = [...new Set(candidates)].map(c => `"${c}"`).join(', ');
                problems.push(`#${number}: references ${cited} but none of those files exist in this branch.`);
                continue;
              }

              // 3. Spec must not still be a DRAFT — no code merges against an unreviewed design.
              const specBody = fs.readFileSync(specPath, 'utf8');
              const statusMatch = specBody.match(/^>\s*Status:\s*(.+?)\s*$/m);
              const status = statusMatch ? statusMatch[1].trim().toUpperCase() : '';
              if (status === 'DRAFT') {
                problems.push(`#${number}: spec "${specPath}" is still DRAFT — promote it to READY before merging code against it.`);
                continue;
              }

              // 4. Issue should belong to a milestone (warn, do not block).
              if (!issue.milestone) {
                core.warning(`#${number}: not assigned to a milestone.`);
              }

              core.info(`#${number}: OK -> ${specPath}` + (issue.milestone ? ` (milestone: ${issue.milestone.title})` : ''));
            }

            if (problems.length > 0) {
              core.setFailed('Planning chain broken:\n' + problems.map(p => '  - ' + p).join('\n'));
            }
