name: Issue spec check

# Soft enforcement of "no design-doc, no issue": flags any implementation-step
# issue that does not reference an existing spec. Cannot block issue creation
# (GitHub has no pre-create hook) — the planning gate blocks the resulting PR.

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Verify issue references a spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const label = 'needs-spec';
            const specPattern = /docs\/spec-[A-Za-z0-9._-]+\.md/;

            const has = (issue.labels || []).some(l => (l.name || l) === label);
            const match = (issue.body || '').match(specPattern);

            let valid = false;
            if (match) {
              try {
                await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: match[0],
                });
                valid = true;
              } catch (e) {
                valid = false;
              }
            }

            if (valid) {
              if (has) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: label,
                }).catch(() => {});
              }
              return;
            }

            if (!has) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [label],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body:
                  'This issue does not reference an existing spec. ' +
                  'Add a path matching `docs/spec-*.md` that exists on the default branch.\n\n' +
                  'No design-doc, no issue: a PR closing this issue will be blocked by the planning gate until the link is valid.',
              });
            }
